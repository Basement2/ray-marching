name: Release
on:
  push:
    branches:
      - main
permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - name: Upgrade npm
        run: npm install -g npm@latest
      - name: Install dependencies
        run: npm ci
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
      - name: Publish to npm (OIDC)
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if ! npm view ray-marching@$CURRENT_VERSION version > /dev/null 2>&1; then
            npm publish --provenance --access public
          else
            echo "Version $CURRENT_VERSION already published, skipping."
          fi
